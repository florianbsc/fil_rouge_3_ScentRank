services:

  api:
    build:
      context: ./backend              # On construit l’image à partir du dossier backend
      target: dev                     # On utilise la target "dev" du Dockerfile (hot reload NestJS)
      dockerfile: ../Dockerfile       # On utilise le Dockerfile multi-stage situé à la racine
    # container_name: nest_api_dev    # (Optionnel) Si tu veux un nom fixe pour le conteneur
    ports:
      - "${PORT:-3000}:3000"          # Expose le port défini dans .env.dev (ou 3000 par défaut)
    env_file: .env.dev                # Charge les variables d’environnement depuis .env.dev
    volumes:
      - ./backend:/usr/src/app        # Monte ton code local → synchro automatique avec le conteneur
      - node_modules_dev:/usr/src/app/node_modules
                                      # Volume nommé pour node_modules (évite les conflits host/container)
    depends_on:
      mongo-dev:
        condition: service_healthy   # L’API démarre seulement si MongoDB est healthy
    profiles: [ "dev" ]               # Active uniquement ce service si le profil "dev" est utilisé

  mongo-dev:
    image: mongo:6.0                  # Utilise l’image officielle MongoDB version 6
    # container_name: mongo_dev       # (Optionnel) Nom fixe pour le conteneur MongoDB
    restart: unless-stopped           # Relance auto du conteneur sauf si tu l’arrêtes manuellement
    env_file: .env.dev                # Variables d’env pour configurer Mongo (user, mdp, db…)
    ports:
      - "${MONGO_PORT:-27017}:27017"  # Expose le port Mongo défini dans .env.dev (ou 27017 par défaut)
    volumes:
      - mongo_data_dev:/data/db       # Volume persistant pour les données Mongo
        # - ./init-mongo:/docker-entrypoint-initdb.d
                                      # (Optionnel) Dossier pour initialiser la DB avec des scripts
    healthcheck:                      # Vérifie que Mongo est bien prêt avant de lancer l’API
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 })' | mongosh localhost:27017/test --quiet || exit 1"]
      interval: 5s                    # Vérifie toutes les 5 secondes
      timeout: 3s                     # Timeout max 3s pour la commande
      retries: 20                     # Retente jusqu’à 20 fois avant de déclarer le conteneur KO

volumes:
  node_modules_dev:                   # Volume pour stocker node_modules en dev
  mongo_data_dev:                     # Volume persistant pour la base Mongo en dev
